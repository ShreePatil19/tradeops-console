# Eval CI workflow for TradeOps Console
#
# IMPORTANT: This workflow requires a GOOGLE_GENERATIVE_AI_API_KEY repo secret.
# Use a separate test key with its own daily quota budget so eval runs do not
# exhaust the production key. Go to:
#   Settings > Secrets and variables > Actions > New repository secret
# and add: GOOGLE_GENERATIVE_AI_API_KEY = <your-test-key>
#
# Trigger conditions:
#   - Pull requests that touch eval fixtures, agent route handlers, or shared lib
#   - Manual dispatch via the Actions tab (workflow_dispatch)

name: Eval

on:
  pull_request:
    paths:
      - "evals/**"
      - "src/app/api/agents/**"
      - "src/lib/**"
  workflow_dispatch:

jobs:
  eval:
    name: Run eval harness
    runs-on: ubuntu-latest

    env:
      # Expose the repo secret under the name the AI SDK env var expects.
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}

    steps:
      - name: Check for API key secret
        id: check_key
        shell: bash
        run: |
          if [ -z "$GOOGLE_GENERATIVE_AI_API_KEY" ]; then
            echo "::warning::GOOGLE_GENERATIVE_AI_API_KEY repo secret is not set; eval job will be skipped. Add it under Settings > Secrets and variables > Actions."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check_key.outputs.has_key == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.check_key.outputs.has_key == 'true'
        with:
          version: 11

      - uses: actions/setup-node@v4
        if: steps.check_key.outputs.has_key == 'true'
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        if: steps.check_key.outputs.has_key == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        if: steps.check_key.outputs.has_key == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        if: steps.check_key.outputs.has_key == 'true'
        run: pnpm build

      - name: Start Next.js server in background
        if: steps.check_key.outputs.has_key == 'true'
        run: pnpm start &

      - name: Wait for server to be ready (timeout 60s)
        if: steps.check_key.outputs.has_key == 'true'
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run eval harness
        if: steps.check_key.outputs.has_key == 'true'
        run: pnpm eval --base-url http://localhost:3000
